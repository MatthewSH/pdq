name: Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag (e.g. 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create and push tag
        run: |
          git tag v${{ github.event.inputs.version }}
          git push origin v${{ github.event.inputs.version }}